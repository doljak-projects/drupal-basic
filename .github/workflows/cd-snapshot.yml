name: 'CD Snapshot — Deploy to Pantheon Dev'

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (e.g. feat/my-feature)'
        required: true
        default: ''
  push:
    branches:
      - 'feat/*'
      - 'refactor/*'
      - 'chore/*'

env:
  PANTHEON_GIT: ssh://codeserver.dev.a8d8a8ab-5975-4b7c-8e19-7da6c8483384@codeserver.dev.a8d8a8ab-5975-4b7c-8e19-7da6c8483384.drush.in:2222/~/repository.git
  PANTHEON_HOST: codeserver.dev.a8d8a8ab-5975-4b7c-8e19-7da6c8483384.drush.in

jobs:
  deploy:
    name: Deploy to Pantheon Dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387
        with:
          ssh-private-key: ${{ secrets.PANTHEON_SSH_PRIVATE_KEY }}

      - name: Add Pantheon to known_hosts
        run: ssh-keyscan -p 2222 ${{ env.PANTHEON_HOST }} >> ~/.ssh/known_hosts

      - name: Push to Pantheon Dev
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git remote add pantheon ${{ env.PANTHEON_GIT }}
          git fetch pantheon master
          git show pantheon/master:pantheon.upstream.yml > pantheon.upstream.yml
          git add pantheon.upstream.yml
          git diff --cached --quiet || git commit -m "chore: preserve pantheon.upstream.yml from Pantheon upstream"
          git push pantheon HEAD:master --force-with-lease

      - name: Tag as SNAPSHOT
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          VERSION=${LATEST:-0.0.0}
          SHA=$(git rev-parse --short HEAD)
          TAG="${VERSION}-SNAPSHOT.${SHA}"
          git tag "$TAG" || true
          git push origin "$TAG" || true
